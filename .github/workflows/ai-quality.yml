name: AI Code Quality Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: AI Code Quality Scan
        id: quality
        shell: python
        env:
          API_URL: ${{ secrets.AI_QUALITY_API }}
        run: |
          import requests, os, json, time, sys

          api = os.environ["API_URL"]
          repo = "https://github.com/fff666888521/cs01.git"
          branch = "${{ github.ref_name }}"

          print("=" * 54)
          print("  AI Code Quality Scan - Starting...")
          print("=" * 54)
          print(f"  API: {api}")
          print(f"  Repo: {repo}")
          print(f"  Branch: {branch}")
          print("=" * 54)

          resp = requests.post(
              f"{api}/git-scan",
              json={"repo_url": repo, "branch": branch},
              headers={"Content-Type": "application/json"},
              timeout=30,
          )
          if not resp.ok:
              print(f"[ERROR] Scan failed to start: {resp.text}")
              sys.exit(1)
          scan = resp.json()
          scan_id = scan["scan_id"]
          print(f"[SCAN ID] {scan_id}")
          print()

          done = False
          while not done:
              prog = requests.get(f"{api}/git-scan/{scan_id}/progress", timeout=10).json()
              p = prog.get("progress", {})
              stage = p.get("stage", "")
              msg = p.get("message", "")

              if stage == "analyzing" and p.get("total", 0) > 0:
                  curr = p["current"]
                  total = p["total"]
                  bar = "█" * int(curr / total * 20) + "░" * (20 - int(curr / total * 20))
                  sys.stdout.write(f"\r  [{bar}] {curr}/{total}  {msg}")
                  sys.stdout.flush()
              elif msg:
                  print(f"[{stage}] {msg}")

              if prog.get("result"):
                  done = True
                  result = prog["result"]
              else:
                  time.sleep(1)

          print()
          print()
          print("=" * 54)
          print("  AI Analysis Complete")
          print("=" * 54)
          print(f"  Score:    {result.get('overall_score', 'N/A')}/100")
          print(f"  Issues:   {result.get('total_issues', 0)} (HIGH {result.get('high_issues', 0)})")
          decision = result.get('overall_decision', {})
          print(f"  Decision: {decision.get('label', 'N/A')}")
          print()

          for f in result.get("files", []):
              status = f.get("status", "unknown")
              score = f.get("score", {}).get("total", "?")
              issues_n = len(f.get("issues", []))
              icon = "✓" if status == "pass" else "⚠" if status == "warn" else "✗" if status == "block" else "?"
              print(f"  [{icon}] [AI] {f.get('file_path', '?')}  (score: {score}, issues: {issues_n})")

          with open("quality_result.json", "w") as f:
              json.dump(result, f)

      - name: Check Quality Gate
        if: always()
        shell: python
        run: |
          import json
          with open("quality_result.json") as f:
              r = json.load(f)
          gate = r.get("overall_decision", {}).get("status", "PASS")
          score = r.get("overall_score", 100)
          print(f"Quality Gate: {gate}, Score: {score}/100")
          if gate == "BLOCK":
              exit(1)